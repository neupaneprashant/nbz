name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: travel-platform/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: travel-platform/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type check/build
        run: npm run build

      - name: Run lint when script exists
        run: |
          if npm run | grep -qE '^\s*lint\b'; then
            npm run lint
          else
            echo "No lint script defined; skipping."
          fi

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: travel-platform/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: travel-platform/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test
