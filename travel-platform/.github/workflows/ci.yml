name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: travel-platform/frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('travel-platform/frontend/package-lock.json') }}

      - name: Install dependencies
        working-directory: travel-platform/frontend
        run: npm ci

      - name: Run type check/build
        working-directory: travel-platform/frontend
        run: npm run build

      - name: Run lint
        continue-on-error: true
        working-directory: travel-platform/frontend
        run: npm run lint

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: travel-platform/backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('travel-platform/backend/package-lock.json') }}

      - name: Install dependencies
        working-directory: travel-platform/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: travel-platform/backend
        run: npx prisma generate

      - name: Run lint
        working-directory: travel-platform/backend
        run: npm run lint

      - name: Run tests
        working-directory: travel-platform/backend
        run: npm run test
